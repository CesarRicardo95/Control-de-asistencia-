<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Asistencia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Control de Asistencia</h1>

<div class="selector">
    <label>Selecciona una clase:</label>
    <select id="clase" onchange="cargarLista()">
        <option value="CANTO">Clase 1</option>
        <option value="Clase 2">GUITARRA</option>
        <option value="Clase 3">Clase 3</option>
        <option value="Clase 4">Clase 4</option>
    </select>
</div>

<h2>Lista de Estudiantes</h2>
<div id="lista"></div>

<button onclick="guardarAsistencia()">Guardar Asistencia</button>

<script src="script.js"></script>
</body>
</html>
