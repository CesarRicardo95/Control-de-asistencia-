<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Asistencia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Control de Asistencia</h1>

<div class="selector">
    <label>Selecciona una clase:</label>
    <select id="clase" onchange="cargarLista()">
        <option value="Clase 1">PIANO</option>
        <option value="Clase 2">GUITARRA</option>
        <option value="Clase 3">BATERIA</option>
        <option value="Clase 4">CANTO</option>
    </select>
</div>
    

    
<h2>Lista de Estudiantes</h2>
<div id="lista"></div>

<button onclick="guardarAsistencia()">Guardar Asistencia</button>

<script src="script.js"></script>
</body>
</html>

<h2>Historial de Asistencia</h2>
<table>
    <thead>
        <tr>
            <th>Fecha</th>
            <th>Clase</th>
            <th>Nombre</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody id="historial"></tbody>
</table>
